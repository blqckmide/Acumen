<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:#1f2937;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

.btn{
padding:10px;
background:#22c55e;
border:none;
color:white;
margin-top:10px;
cursor:pointer;
border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>🛠 Admin Panel</h2>

<div class="card">

<p>Update PDF Links</p>

<input id="pq" placeholder="Past Questions Link">
<input id="ms" placeholder="Mastery Series Link">

<button class="btn" onclick="save()">Save</button>

</div>

</div>

<script>

const dbURL = "https://medsphere-c794d-default-rtdb.firebaseio.com";

// SAVE TO FIREBASE (FIXED)
function save(){

fetch(dbURL + "/files.json", {
    method: "PATCH",
    body: JSON.stringify({
        pq: document.getElementById("pq").value,
        ms: document.getElementById("ms").value
    })
});

alert("Updated successfully!");
}

</script>

</body>
</html>
