<!DOCTYPE html>
<html>
<head>
<title>Acumen Mastery Series</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {margin:0;font-family:Arial;background:#0b1220;color:white;}
header {padding:15px;background:#111827;display:flex;justify-content:space-between;}
.container {padding:20px;max-width:900px;margin:auto;}
.card {background:#1f2937;padding:20px;border-radius:10px;margin-top:20px;}
.btn {padding:10px 15px;background:#22c55e;color:white;border-radius:6px;text-decoration:none;display:inline-block;}
.pay {background:#3b82f6;}
.locked {opacity:0.4;}
</style>
</head>

<body>

<header>
<h3>ACUMEN MASTERY SERIES</h3>
</header>

<div class="container">

<div class="card">
<h2>📦 Full Access Package</h2>
<p>Past Questions + Mastery Series</p>
<h3>₦1,500</h3>

<button class="btn pay" onclick="pay()">Pay with Paystack</button>
</div>

<div class="card locked" id="content">
<h2>📘 Past Questions</h2>
<a id="pq" class="btn" target="_blank">Open PDF</a>

<h2 style="margin-top:20px;">📚 Mastery Series</h2>
<a id="ms" class="btn" target="_blank">Open PDF</a>
</div>

</div>

<script>

// LOAD SAVED FILES
document.getElementById("pq").href = localStorage.getItem("pq") || "#";
document.getElementById("ms").href = localStorage.getItem("ms") || "#";

// PAYSTACK PAYMENT
function pay() {
    let handler = PaystackPop.setup({
        key: "YOUR_PUBLIC_KEY",
        email: "student@email.com",
        amount: 150000,
        currency: "NGN",

        callback: function(response) {

            // VERIFY PAYMENT WITH BACKEND
            fetch("http://localhost:3000/verify/" + response.reference)
            .then(res => res.json())
            .then(data => {

                if(data.success) {
                    localStorage.setItem("paid", "true");
                    document.getElementById("content").style.opacity = "1";
                    alert("Payment successful! Access unlocked.");
                } else {
                    alert("Payment not verified.");
                }

            });

        }
    });

    handler.openIframe();
}

// AUTO UNLOCK IF PAID
if(localStorage.getItem("paid") === "true") {
    document.getElementById("content").style.opacity = "1";
}

</script>

<script src="https://js.paystack.co/v1/inline.js"></script>

</body>
</html>
