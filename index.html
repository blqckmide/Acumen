<!DOCTYPE html>
<html>
<head>
<title>Acumen Mastery Series</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-weight:bold;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1f2937;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.btn{
padding:12px 15px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
text-decoration:none;
display:inline-block;
cursor:pointer;
}

.pay{
background:#3b82f6;
}

.lock{
opacity:0.4;
}
</style>
</head>

<body>

<header>
ACUMEN MASTERY SERIES
</header>

<div class="container">

<div class="card">
<h2>📦 Full Access Package</h2>
<p>Past Questions + Mastery Series</p>
<h2>₦1000</h2>

<button class="btn pay" onclick="pay()">Pay & Unlock</button>
</div>

<div class="card lock" id="content">

<h3>📘 Past Questions</h3>
<a id="pq" class="btn" target="_blank">Open PDF</a>

<h3 style="margin-top:20px;">📚 Mastery Series</h3>
<a id="ms" class="btn" target="_blank">Open PDF</a>

</div>

</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

const dbURL = "https://medsphere-c794d-default-rtdb.firebaseio.com";

// LOAD FILES
async function loadFiles(){
    let res = await fetch(dbURL + "/files.json");
    let data = await res.json();

    if(data){
        document.getElementById("pq").href = data.pq || "#";
        document.getElementById("ms").href = data.ms || "#";
    }
}
loadFiles();

// PAYSTACK PAYMENT (FIXED)
function pay(){

let handler = PaystackPop.setup({
    key: "pk_test_4ff51d096c724a616f90e1c8174a35cfead0aa72",
    email: "student@email.com",
    amount: 100000,
    currency: "NGN",

    callback: function(response){

        // SAVE PAYMENT STATUS
        fetch(dbURL + "/users.json", {
            method: "PATCH",
            body: JSON.stringify({
                paid: true
            })
        });

        alert("Payment successful!");
        document.getElementById("content").style.opacity = "1";
    }
});

handler.openIframe();
}

// CHECK PAYMENT STATUS
async function check(){
    let res = await fetch(dbURL + "/users.json");
    let data = await res.json();

    if(data && data.paid){
        document.getElementById("content").style.opacity = "1";
    }
}

check();

</script>

</body>
</html>
