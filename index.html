<!DOCTYPE html>
<html>
<head>
<title>Acumen Mastery Series</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1f2937;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.btn{
padding:12px 15px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
text-decoration:none;
display:inline-block;
cursor:pointer;
}

.pay{
background:#22c55e;
}

#access{
display:none;
margin-top:20px;
text-align:center;
}
</style>
</head>

<body>

<header>
ACUMEN MASTERY SERIES
</header>

<div class="container">

<div class="card">
<h2>📦 Full Access Package</h2>
<p>Past Questions + Mastery Series</p>
<h2>₦1050</h2>

<button class="btn pay" onclick="pay()">Pay & Get Access</button>
</div>

<div class="card" id="access">

<h3>✅ Payment Successful</h3>
<p>You now have access to the materials.</p>

<a class="btn"
id="whatsappLink"
target="_blank">

📲 Get Access on WhatsApp
</a>

</div>

</div>

<!-- PAYSTACK -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

function pay(){

let email = prompt("Enter your email:");
if(!email){
alert("Email is required");
return;
}

let handler = PaystackPop.setup({
    key: "pk_live_c16687bba93b123a458691548fee35c16c9636d6",
    email: email,
    amount: 105000, // ✅ ₦1050
    currency: "NGN",

    callback: function(response){

        document.getElementById("access").style.display = "block";

        let message = "Hi, I just paid for Acumen Mastery Series (₦1050). Ref: " + response.reference;

        let link = "https://wa.me/2349015299491?text=" + encodeURIComponent(message);

        document.getElementById("whatsappLink").href = link;

        alert("Payment successful! Click WhatsApp to get access.");
    },

    onClose: function(){
        alert("Payment cancelled");
    }

});

handler.openIframe();
}

</script>

</body>
</html>
