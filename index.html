<!DOCTYPE html>
<html>
<head>
<title>Acumen Mastery Series</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;}
header{padding:15px;background:#111827;text-align:center;}
.container{padding:20px;}
.card{background:#1f2937;padding:20px;border-radius:10px;margin-top:20px;}
.btn{padding:12px;background:#22c55e;color:white;border:none;border-radius:6px;display:inline-block;text-decoration:none;}
.lock{opacity:0.4;}
</style>
</head>

<body>

<header>
<h2>ACUMEN MASTERY SERIES</h2>
</header>

<div class="container">

<div class="card">
<h3>📦 Full Access</h3>
<p>Past Questions + Mastery Series</p>
<h2>₦1,500</h2>

<button class="btn" onclick="pay()">Pay with Paystack</button>
</div>

<div class="card lock" id="content">
<h3>📘 Past Questions</h3>
<a id="pq" class="btn" target="_blank">Open PDF</a>

<h3 style="margin-top:20px;">📚 Mastery Series</h3>
<a id="ms" class="btn" target="_blank">Open PDF</a>
</div>

</div>

<script>

// LOAD FILES FROM ADMIN (LOCAL STORAGE)
document.getElementById("pq").href = localStorage.getItem("pq") || "#";
document.getElementById("ms").href = localStorage.getItem("ms") || "#";

// PAYSTACK PAYMENT (NO BACKEND)
function pay(){
    let handler = PaystackPop.setup({
        key: "YOUR_PUBLIC_KEY",
        email: "student@email.com",
        amount: 150000,
        currency: "NGN",

        callback: function(response){

            // VERIFY PAYMENT DIRECTLY
            fetch("https://api.paystack.co/transaction/verify/" + response.reference, {
                headers: {
                    Authorization: "Bearer YOUR_SECRET_KEY"
                }
            })
            .then(res => res.json())
            .then(data => {

                if(data.data.status === "success"){
                    localStorage.setItem("paid","true");
                    document.getElementById("content").style.opacity="1";
                    alert("Payment successful!");
                } else {
                    alert("Payment failed");
                }

            });

        }
    });

    handler.openIframe();
}

// AUTO UNLOCK
if(localStorage.getItem("paid")==="true"){
    document.getElementById("content").style.opacity="1";
}

</script>

<script src="https://js.paystack.co/v1/inline.js"></script>

</body>
</html>
